<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111">
<title>LIFT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--s1:#1c1c1c;--s2:#252525;--s3:#2e2e2e;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.22);
  --t1:#f0ede8;--t2:#999;--t3:#555;
  --ac:#c5f135;--ac2:rgba(197,241,53,.14);
  --d1:#5bb8f5;--d1b:rgba(91,184,245,.13);
  --d2:#f56b8b;--d2b:rgba(245,107,139,.13);
  --d3:#f5b535;--d3b:rgba(245,181,53,.13);
  --r:10px;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--mono);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px}
.app{max-width:480px;margin:0 auto;padding:0 12px 100px}

/* NAV */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:var(--s1);border-top:1px solid var(--b2);display:flex;z-index:99;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:14px 0 10px;border:none;background:none;color:var(--t3);font-family:var(--mono);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--ac)}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 12px}
.logo{font-family:var(--sans);font-size:20px;font-weight:700;letter-spacing:-1px}
.logo span{color:var(--ac)}
.badge{font-size:11px;color:var(--t3);background:var(--s1);border:1px solid var(--b1);padding:3px 10px;border-radius:20px}

/* DAY PILLS */
.day-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.day-pill{padding:12px 6px;border:1px solid var(--b1);background:var(--s1);border-radius:var(--r);cursor:pointer;text-align:center;transition:all .15s}
.day-pill .dl{font-family:var(--sans);font-size:17px;font-weight:700;display:block;margin-bottom:1px}
.day-pill .ds{font-size:10px;color:var(--t3)}
.day-pill:hover{border-color:var(--b2)}
.day-pill.on-d1{background:var(--d1b);border-color:var(--d1)} .day-pill.on-d1 .dl{color:var(--d1)}
.day-pill.on-d2{background:var(--d2b);border-color:var(--d2)} .day-pill.on-d2 .dl{color:var(--d2)}
.day-pill.on-d3{background:var(--d3b);border-color:var(--d3)} .day-pill.on-d3 .dl{color:var(--d3)}

/* EXERCISE CARD */
.ex-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.ex-card.open{border-color:var(--b2)}
.ex-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;user-select:none}
.ex-nm{font-family:var(--sans);font-size:14px;font-weight:700;margin-bottom:3px;color:var(--t1)}
.ex-pr{font-size:11px;color:var(--t3)}
.ch{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:transform .2s;font-size:10px}
.ex-card.open .ch{transform:rotate(90deg)}
.ex-bd{display:none;border-top:1px solid var(--b1);padding:14px}
.ex-card.open .ex-bd{display:block}

/* SET INPUTS */
.sets-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sets-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.set-wrap{display:flex;flex-direction:column;gap:3px}
.set-n{font-size:10px;color:var(--t3);text-align:center}
.set-in{width:100%;padding:10px 4px;text-align:center;font-family:var(--mono);font-size:15px;font-weight:500;
  background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1);
  transition:border-color .15s;-moz-appearance:textfield}
.set-in::-webkit-outer-spin-button,.set-in::-webkit-inner-spin-button{-webkit-appearance:none}
.set-in:focus{outline:none;border-color:var(--b3)}
.set-in.filled{border-color:rgba(255,255,255,.25)}
.set-note{width:100%;margin-bottom:10px;padding:7px 10px;font-family:var(--mono);font-size:12px;
  background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t2);resize:none}
.set-note:focus{outline:none;border-color:var(--b2)}
.save-btn{width:100%;padding:11px;border:none;background:var(--ac);color:#111;
  font-family:var(--sans);font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;transition:opacity .15s}
.save-btn:active{opacity:.8}
.tmpl-banner{font-size:11px;color:var(--t3);text-align:center;margin-bottom:8px;padding:6px;
  background:var(--s2);border-radius:6px;border:1px solid var(--b1)}
.tmpl-banner b{color:var(--t2)}

/* HISTORY */
.hist-sec{margin-top:12px;border-top:1px solid var(--b1);padding-top:10px}
.hist-ttl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.hist-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;cursor:pointer}
.hist-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.hist-dot.d1{background:var(--d1)}.hist-dot.d2{background:var(--d2)}.hist-dot.d3{background:var(--d3)}
.hist-date{font-size:10px;color:var(--t3);width:60px;flex-shrink:0}
.hist-raw{font-size:11px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* SESSIONS VIEW */
.sess-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sess-ttl{font-family:var(--sans);font-size:16px;font-weight:700}
.new-sess-btn{padding:8px 14px;border:1px solid var(--b2);background:var(--s1);color:var(--t1);
  font-family:var(--mono);font-size:12px;border-radius:8px;cursor:pointer}
.new-sess-btn:hover{border-color:var(--b3)}
.sess-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;
  padding:13px 14px;cursor:pointer;transition:border-color .15s}
.sess-card:hover{border-color:var(--b2)}
.sess-card-top{display:flex;align-items:center;justify-content:space-between}
.sess-name{font-family:var(--sans);font-size:14px;font-weight:700}
.sess-meta{font-size:11px;color:var(--t3);margin-top:4px}
.sess-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.sess-tag.d1{background:var(--d1b);color:var(--d1)}
.sess-tag.d2{background:var(--d2b);color:var(--d2)}
.sess-tag.d3{background:var(--d3b);color:var(--d3)}
.del-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:4px}
.del-btn:hover{color:#f56b8b}
.empty-state{text-align:center;padding:40px 0;color:var(--t3);font-size:13px}

/* SESSION DETAIL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end}
.modal{background:var(--s1);width:100%;max-width:480px;margin:0 auto;border-radius:16px 16px 0 0;
  max-height:85vh;overflow-y:auto;padding:20px 16px 40px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-ttl{font-family:var(--sans);font-size:17px;font-weight:700}
.close-btn{background:none;border:none;color:var(--t2);cursor:pointer;font-size:22px;line-height:1;padding:4px}
.modal-ex-row{border-bottom:1px solid var(--b1);padding:10px 0}
.modal-ex-nm{font-size:12px;color:var(--t2);margin-bottom:4px}
.modal-ex-sets{font-size:14px;color:var(--t1)}
.modal-ex-note{font-size:11px;color:var(--t3);margin-top:2px}
.load-btn{width:100%;margin-top:16px;padding:12px;border:1px solid var(--ac);background:var(--ac2);
  color:var(--ac);font-family:var(--sans);font-size:14px;font-weight:700;border-radius:8px;cursor:pointer}

/* GRAPH VIEW */
.graph-ex-list{margin-bottom:0}
.graph-ex-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.graph-ex-item:hover{border-color:var(--b2)}
.graph-ex-nm{font-family:var(--sans);font-size:14px;font-weight:700}
.graph-ex-day{font-size:10px;padding:2px 8px;border-radius:20px;margin-top:3px;display:inline-block}
.graph-ex-day.d1{background:var(--d1b);color:var(--d1)}
.graph-ex-day.d2{background:var(--d2b);color:var(--d2)}
.graph-ex-day.d3{background:var(--d3b);color:var(--d3)}
.graph-view{display:none}
.graph-view.visible{display:block}
.graph-list-view{display:block}
.graph-list-view.hidden{display:none}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--t2);
  font-family:var(--mono);font-size:13px;cursor:pointer;padding:0;margin-bottom:14px}
.chart-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:12px}
.chart-ttl{font-family:var(--sans);font-size:16px;font-weight:700;margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--t3);margin-bottom:14px}
.chart-wrap{position:relative;height:200px}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.stat-box{background:var(--s2);border-radius:8px;padding:10px;text-align:center}
.stat-val{font-family:var(--sans);font-size:16px;font-weight:700;color:var(--t1)}
.stat-lbl{font-size:10px;color:var(--t3);margin-top:2px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-in{width:100%;padding:10px 14px;font-family:var(--mono);font-size:13px;
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1)}
.search-in:focus{outline:none;border-color:var(--b2)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">LIFT<span>.</span></div>
    <div class="badge" id="hdr-date"></div>
  </header>

  <!-- LOG VIEW -->
  <div id="view-log">
    <div class="day-row">
      <div class="day-pill" id="pill-d1" onclick="selDay('d1')"><span class="dl">D1</span><span class="ds">Tuesday</span></div>
      <div class="day-pill" id="pill-d2" onclick="selDay('d2')"><span class="dl">D2</span><span class="ds">Thursday</span></div>
      <div class="day-pill" id="pill-d3" onclick="selDay('d3')"><span class="dl">D3</span><span class="ds">Saturday</span></div>
    </div>
    <div id="ex-list"></div>
  </div>

  <!-- SESSIONS VIEW -->
  <div id="view-sessions" style="display:none">
    <div class="sess-toolbar">
      <div class="sess-ttl">Sessions</div>
      <button class="new-sess-btn" onclick="exportSessions()">Export JSON</button>
    </div>
    <div id="sess-list"></div>
  </div>

  <!-- GRAPH VIEW -->
  <div id="view-graph" style="display:none">
    <div class="graph-list-view" id="graph-list-view">
      <input class="search-in" id="graph-search" placeholder="Search exercise…" oninput="filterGraphList()">
      <div id="graph-ex-list" class="graph-ex-list"></div>
    </div>
    <div class="graph-view" id="graph-detail">
      <button class="back-btn" onclick="backToList()">← All exercises</button>
      <div class="chart-card">
        <div class="chart-ttl" id="gd-name"></div>
        <div class="chart-sub" id="gd-sub"></div>
        <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
        <div class="stat-row">
          <div class="stat-box"><div class="stat-val" id="st-max">—</div><div class="stat-lbl">Max kg</div></div>
          <div class="stat-box"><div class="stat-val" id="st-sess">—</div><div class="stat-lbl">Sessions</div></div>
          <div class="stat-box"><div class="stat-val" id="st-prog">—</div><div class="stat-lbl">Progress</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-ttl" id="modal-ttl"></div>
      <button class="close-btn" onclick="hideModal()">×</button>
    </div>
    <div id="modal-body"></div>
    <button class="load-btn" id="load-btn" onclick="loadSession()">Load this session as template ↗</button>
  </div>
</div>

<nav>
  <button class="nav-btn active" id="nb-log" onclick="switchView('log')">
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Log
  </button>
  <button class="nav-btn" id="nb-sessions" onclick="switchView('sessions')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Sessions
  </button>
  <button class="nav-btn" id="nb-graph" onclick="switchView('graph')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </button>
</nav>

function getSessions(){try{return JSON.parse(localStorage.getItem('lift_sessions')||'[]')}catch{return[]}}
function saveSessions(s){localStorage.setItem('lift_sessions',JSON.stringify(s))}
function getTemplate(){try{return JSON.parse(localStorage.getItem('lift_tmpl')||'null')}catch{return null}}
function saveTemplate(t){localStorage.setItem('lift_tmpl',JSON.stringify(t))}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function parseMaxKg(raw){
  if(!raw||raw==='done')return null;
  const nums=raw.replace(/[()]/g,' ').match(/\d+(\.\d+)?/g);
  if(!nums)return null;
  return Math.max(...nums.map(Number));
}
function getHistory(exName){
  for(const d of ['d1','d2','d3']){
    if(HIST[d][exName]) return{hist:HIST[d][exName],day:d};
  }
  // case-insensitive
  for(const d of ['d1','d2','d3']){
    const k=Object.keys(HIST[d]).find(k2=>k2.toLowerCase()===exName.toLowerCase());
    if(k) return{hist:HIST[d][k],day:d};
  }
  return{hist:[],day:null};
}
function fmtDate(iso){
  const d=new Date(iso+'T12:00:00');
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}
function dayColor(d){return d==='d1'?'var(--d1)':d==='d2'?'var(--d2)':'var(--d3)'}

// ── LOG VIEW ──────────────────────────────────────────────────────────────────
function selDay(d){
  curDay=d;
  ['d1','d2','d3'].forEach(x=>{
    document.getElementById('pill-'+x).className='day-pill'+(x===d?' on-'+d:'');
  });
  renderLog();
}

function renderLog(){
  const exNames=DAYS[curDay].exercises;
  const c=document.getElementById('ex-list');
  c.innerHTML='';
  const tmpl=getTemplate();
  exNames.forEach(name=>{
    const {hist}=getHistory(name);
    const last=hist.length?hist[hist.length-1]:null;
    const preview=last?last.raw:'No data yet';
    const cur=todaySets[name]||{};
    const hasTmpl=tmpl&&tmpl.day===curDay&&tmpl.sets&&tmpl.sets[name];

    const card=document.createElement('div');
    card.className='ex-card';
    card.id='card-'+CSS.escape(name);

    // Recent history rows
    const recent=hist.slice(-4);
    const histHTML=recent.map(h=>`
      <div class="hist-row" title="${h.raw}">
        <div class="hist-dot ${h.day||curDay}"></div>
        <div class="hist-date">${fmtDate(h.date)}</div>
        <div class="hist-raw">${h.raw}</div>
      </div>`).join('');

    // Template hint
    const tmplSets=hasTmpl?tmpl.sets[name]:null;
    const tmplHint=tmplSets?`<div class="tmpl-banner">Template: <b>${[tmplSets.s1,tmplSets.s2,tmplSets.s3].filter(Boolean).join(' · ')}</b>${tmplSets.note?` — ${tmplSets.note}`:''}</div>`:'';

    card.innerHTML=`
      <div class="ex-hd" onclick="toggleEx('${name.replace(/'/g,"\\'")}')">
        <div>
          <div class="ex-nm">${name}</div>
          <div class="ex-pr">${preview}</div>
        </div>
        <div class="ch">▶</div>
      </div>
      <div class="ex-bd">
        ${tmplHint}
        <div class="sets-lbl">Today's sets (kg)</div>
        <div class="sets-g">
          ${[1,2,3].map(i=>`
            <div class="set-wrap">
              <div class="set-n">Set ${i}</div>
              <input class="set-in" type="number" inputmode="decimal" step="0.5"
                id="si-${CSS.escape(name)}-${i}"
                value="${cur['s'+i]||''}"
                placeholder="${tmplSets&&tmplSets['s'+i]?tmplSets['s'+i]:'—'}"
                oninput="onInput(this,'${name.replace(/'/g,"\\'")}','s${i}')">
            </div>`).join('')}
        </div>
        <textarea class="set-note" rows="1" placeholder="Note (optional)"
          id="note-${CSS.escape(name)}"
          oninput="onInput(this,'${name.replace(/'/g,"\\'")}','note')">${cur.note||''}</textarea>
        <button class="save-btn" onclick="saveEx('${name.replace(/'/g,"\\'")}')">Save ✓</button>
        ${histHTML?`<div class="hist-sec"><div class="hist-ttl">Recent sessions</div>${histHTML}</div>`:''}
      </div>`;
    c.appendChild(card);
  });
}

function toggleEx(name){
  const id='card-'+CSS.escape(name);
  const card=document.getElementById(id);
  card.classList.toggle('open');
}

function onInput(el,name,field){
  if(!todaySets[name])todaySets[name]={};
  todaySets[name][field]=el.value;
  if(field!=='note')el.classList.toggle('filled',el.value!=='');
}

function saveEx(name){
  const cur=todaySets[name]||{};
  const sets=[cur.s1,cur.s2,cur.s3].map(v=>v?v.trim():'');
  if(sets.every(s=>!s)){alert('Enter at least one set');return;}

  sessions=getSessions();
  // Find or create today's session for this day
  const today=new Date().toISOString().slice(0,10);
  let sess=sessions.find(s=>s.date===today&&s.day===curDay);
  if(!sess){
    sess={id:Date.now(),date:today,day:curDay,sets:{},notes:{}};
    sessions.unshift(sess);
  }
  sess.sets[name]=sets;
  if(cur.note)sess.notes[name]=cur.note;
  saveSessions(sessions);

  // Clear inputs
  todaySets[name]={};
  const card=document.getElementById('card-'+CSS.escape(name));
  if(card){
    [1,2,3].forEach(i=>{const el=document.getElementById('si-'+CSS.escape(name)+'-'+i);if(el){el.value='';el.classList.remove('filled');}});
    const n=document.getElementById('note-'+CSS.escape(name));if(n)n.value='';
    card.classList.remove('open');
  }
  // Refresh to update preview
  setTimeout(()=>renderLog(),50);
}

          <div class="sess-meta">${exCount} exercise${exCount!==1?'s':''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="sess-tag ${s.day}">${(s.day||'').toUpperCase()}</span>
          <button class="del-btn" onclick="delSession(event,${idx})">🗑</button>
        </div>
      </div>`;
    div.addEventListener('click',()=>showSession(s));
    c.appendChild(div);
  });
}

function delSession(e,idx){
  e.stopPropagation();
  if(!confirm('Delete this session?'))return;
  sessions=getSessions();
  sessions.splice(idx,1);
  saveSessions(sessions);
  renderSessions();
}

function showSession(s){
  modalSession=s;
  document.getElementById('modal-ttl').textContent=fmtDate(s.date)+' — '+(s.day||'').toUpperCase();
  const body=document.getElementById('modal-body');
  const exNames=Object.keys(s.sets||{});
  if(!exNames.length){body.innerHTML='<div class="empty-state">No exercises logged.</div>';return;}
  body.innerHTML=exNames.map(nm=>{
    const sets=(s.sets[nm]||[]).filter(Boolean).join(' · ');
    const note=s.notes&&s.notes[nm]?`<div class="modal-ex-note">${s.notes[nm]}</div>`:'';
    return`<div class="modal-ex-row"><div class="modal-ex-nm">${nm}</div><div class="modal-ex-sets">${sets} kg</div>${note}</div>`;
  }).join('');
  document.getElementById('modal').style.display='flex';
}

function loadSession(){
  if(!modalSession)return;
  // Build template: {day, sets:{exName:{s1,s2,s3,note}}}
  const tmpl={day:modalSession.day,sets:{}};
  const exNames=Object.keys(modalSession.sets||{});
  exNames.forEach(nm=>{
    const arr=modalSession.sets[nm]||[];
    tmpl.sets[nm]={s1:arr[0]||'',s2:arr[1]||'',s3:arr[2]||'',note:(modalSession.notes&&modalSession.notes[nm])||''};
  });
  saveTemplate(tmpl);
  hideModal();
  selDay(modalSession.day||curDay);
  switchView('log');
}

function hideModal(){document.getElementById('modal').style.display='none';}
function closeModal(e){if(e.target===document.getElementById('modal'))hideModal();}

function exportSessions(){
  sessions=getSessions();
  const blob=new Blob([JSON.stringify(sessions,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='workout_sessions.json';a.click();
}

// ── GRAPH VIEW ────────────────────────────────────────────────────────────────
function renderGraphList(){
  const c=document.getElementById('graph-ex-list');
  c.innerHTML='';
  // Collect all exercises from all days + history
  const all=[];
  ['d1','d2','d3'].forEach(d=>{
    DAYS[d].exercises.forEach(nm=>{
      const {hist}=getHistory(nm);
      if(hist.length>0) all.push({name:nm,day:d,count:hist.length});
    });
  });
  // Also add from saved sessions
  getSessions().forEach(s=>{
    Object.keys(s.sets||{}).forEach(nm=>{
      if(!all.find(x=>x.name===nm)){
        all.push({name:nm,day:s.day,count:1});
      }
    });
  });
  const query=document.getElementById('graph-search').value.toLowerCase();
  const filtered=all.filter(x=>x.name.toLowerCase().includes(query));
  filtered.forEach(x=>{
    const div=document.createElement('div');
    div.className='graph-ex-item';
    div.innerHTML=`<div><div class="graph-ex-nm">${x.name}</div><span class="graph-ex-day ${x.day}">${x.day.toUpperCase()}</span></div><div style="color:var(--t3);font-size:11px">${x.count} sessions ▶</div>`;
    div.onclick=()=>showGraph(x.name,x.day);
    c.appendChild(div);
  });
}

function filterGraphList(){renderGraphList();}

function backToList(){
  document.getElementById('graph-list-view').classList.remove('hidden');
  document.getElementById('graph-detail').classList.remove('visible');
  curGraphEx=null;
}

function showGraph(exName,dayKey){
  curGraphEx=exName;
  document.getElementById('graph-list-view').classList.add('hidden');
  document.getElementById('graph-detail').classList.add('visible');
  document.getElementById('gd-name').textContent=exName;
  document.getElementById('gd-sub').textContent='Max weight per session';

  // Collect data: from HIST + from saved sessions
  const points=[];
  const {hist}=getHistory(exName);
  hist.forEach(h=>{
    const max=parseMaxKg(h.raw);
    if(max!==null) points.push({date:h.date,val:max,src:'history'});
  });
  getSessions().forEach(s=>{
    const arr=s.sets&&s.sets[exName];
    if(arr){
      const max=Math.max(...arr.filter(Boolean).map(Number).filter(n=>!isNaN(n)));
      if(isFinite(max)) points.push({date:s.date,val:max,src:'session'});
    }
  });
  points.sort((a,b)=>a.date.localeCompare(b.date));
  // Deduplicate by date (keep max)
  const byDate={};
  points.forEach(p=>{byDate[p.date]=Math.max(byDate[p.date]||0,p.val);});
  const dates=Object.keys(byDate).sort();
  const vals=dates.map(d=>byDate[d]);

  if(chartInst){chartInst.destroy();chartInst=null;}
  const ctx=document.getElementById('main-chart').getContext('2d');
  const col=dayKey==='d1'?'#5bb8f5':dayKey==='d2'?'#f56b8b':'#f5b535';
  chartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels:dates.map(fmtDate),
      datasets:[{label:'Max kg',data:vals,borderColor:col,backgroundColor:col+'22',
        pointBackgroundColor:col,pointRadius:3,tension:.35,fill:true}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y} kg`}}},
      scales:{
        x:{ticks:{color:'#666',font:{size:10},maxRotation:45,maxTicksLimit:8},grid:{color:'rgba(255,255,255,.05)'}},
        y:{ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}}
      }
    }
  });

  // Stats
  const maxV=vals.length?Math.max(...vals):0;
  const firstV=vals.length?vals[0]:0;
  const lastV=vals.length?vals[vals.length-1]:0;
  const prog=firstV>0?Math.round((lastV-firstV)/firstV*100):0;
  document.getElementById('st-max').textContent=maxV?maxV+' kg':'—';
  document.getElementById('st-sess').textContent=dates.length||'—';
  document.getElementById('st-prog').textContent=vals.length>1?(prog>0?'+':'')+prog+'%':'—';
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function switchView(v){
  curView=v;
  ['log','sessions','graph'].forEach(x=>{
    document.getElementById('view-'+x).style.display=x===v?'block':'none';
    document.getElementById('nb-'+x).classList.toggle('active',x===v);
  });
  if(v==='sessions')renderSessions();
  if(v==='graph')renderGraphList();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
selDay('d1');
</script>
